<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Results & Toppers | Medimath Career Institute — Indore</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Home</a> / Results</div>
      <h1>Our Results & Toppers</h1>

  <section class="section">

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderToppers(document.getElementById('results-toppers'));
      renderResults(document.getElementById('results-container'));
